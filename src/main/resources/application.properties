spring.application.name=backend-extrato
server.port=8083

# Datasource PostgreSQL
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# JPA/Hibernate
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC
spring.jpa.properties.hibernate.format_sql=false

# Flyway
spring.flyway.locations=classpath:db/migration

# Web Push
push.vapid.subject=${PUSH_VAPID_SUBJECT:}
push.vapid.public-key=${PUSH_VAPID_PUBLIC_KEY:}
push.vapid.private-key=${PUSH_VAPID_PRIVATE_KEY:}
notifications.bill-payment.cron=${BILL_PAYMENT_NOTIFICATION_CRON:0 0 9 * * *}
notifications.bill-payment.zone=${BILL_PAYMENT_NOTIFICATION_ZONE:America/Sao_Paulo}

# Auth
auth.jwt.secret=${AUTH_JWT_SECRET:backend-extrato-local-dev-secret-change-me}
auth.jwt.issuer=${AUTH_JWT_ISSUER:backend-extrato}
auth.jwt.expiration-seconds=${AUTH_JWT_EXPIRATION_SECONDS:86400}

# Logging
logging.level.org.flywaydb=DEBUG
logging.level.org.springframework.boot.autoconfigure.flyway=DEBUG
logging.level.org.springframework.jdbc.datasource=DEBUG
logging.level.org.hibernate.engine.jdbc=DEBUG
logging.pattern.level=%5p [trace_id=%X{trace_id:-} span_id=%X{span_id:-}]

# Actuator
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=never

# OpenAPI / Swagger
springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.path=/swagger-ui.html

# OpenTelemetry
otel.service.name=${OTEL_SERVICE_NAME:backend-extrato}
otel.resource.attributes=service.namespace=extrato,deployment.environment=${OTEL_DEPLOYMENT_ENV:local},service.version=${OTEL_SERVICE_VERSION:0.0.1-SNAPSHOT}
otel.exporter.otlp.endpoint=${OTEL_EXPORTER_OTLP_ENDPOINT:http://localhost:4318}
otel.exporter.otlp.protocol=${OTEL_EXPORTER_OTLP_PROTOCOL:http/protobuf}
otel.traces.exporter=${OTEL_TRACES_EXPORTER:otlp}
otel.metrics.exporter=${OTEL_METRICS_EXPORTER:otlp}
otel.logs.exporter=${OTEL_LOGS_EXPORTER:otlp}
