spring.application.name=backend-extrato
server.port=8083

# Datasource PostgreSQL
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# JPA/Hibernate
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC
spring.jpa.properties.hibernate.format_sql=false

# Flyway
spring.flyway.locations=classpath:db/migration

# Web Push
push.vapid.subject=${PUSH_VAPID_SUBJECT:}
push.vapid.public-key=${PUSH_VAPID_PUBLIC_KEY:}
push.vapid.private-key=${PUSH_VAPID_PRIVATE_KEY:}

# Auth
auth.jwt.secret=${AUTH_JWT_SECRET:change-this-secret}
auth.jwt.issuer=${AUTH_JWT_ISSUER:backend-extrato}
auth.jwt.expiration-seconds=${AUTH_JWT_EXPIRATION_SECONDS:86400}

# Logging
logging.level.org.flywaydb=DEBUG
logging.level.org.springframework.boot.autoconfigure.flyway=DEBUG
logging.level.org.springframework.jdbc.datasource=DEBUG
logging.level.org.hibernate.engine.jdbc=DEBUG

# Actuator
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=never
