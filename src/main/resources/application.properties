spring.application.name=backend-extrato
server.port=8083

# Datasource MySQL
spring.datasource.url=jdbc:mysql://localhost:3306/extrato
spring.datasource.username=extrato_user
spring.datasource.password=Ere_250893
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA/Hibernate
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.jdbc.time_zone=UTC
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# Flyway - Desabilitado para usar inicializador manual
spring.flyway.enabled=false
# spring.flyway.locations=classpath:db/migration

# Logging
logging.level.org.flywaydb=DEBUG
logging.level.org.springframework.boot.autoconfigure.flyway=DEBUG
logging.level.org.springframework.jdbc.datasource=DEBUG
logging.level.org.hibernate.engine.jdbc=DEBUG

# Actuator
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=never
