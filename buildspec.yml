version: 0.2

env:
  variables:
    AWS_DEFAULT_REGION: us-east-1
    AWS_ACCOUNT_ID: "116671358684"
    REPOSITORY_URI: "116671358684.dkr.ecr.us-east-1.amazonaws.com/backend-extrato"
    IMAGE_TAG: "latest"

phases:
  install:
    runtime-versions:
      java: corretto21

  pre_build:
    commands:
      - echo Login no ECR
      - aws ecr get-login-password --region $AWS_DEFAULT_REGION | docker login --username AWS --password-stdin $AWS_ACCOUNT_ID.dkr.ecr.$AWS_DEFAULT_REGION.amazonaws.com

  build:
    commands:
      - echo Build da aplicacao
      - chmod +x gradlew
      - ./gradlew clean build
      - echo Build da imagem Docker
      - docker build -t $REPOSITORY_URI:$IMAGE_TAG .

  post_build:
    commands:
      - echo Push da imagem
      - docker push $REPOSITORY_URI:$IMAGE_TAG
      - echo Gerando imagedefinitions.json
      - printf '[{"name":"backend-extrato","imageUri":"%s"}]' $REPOSITORY_URI:$IMAGE_TAG > imagedefinitions.json

artifacts:
  files:
    - imagedefinitions.json